version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ai_interviewer_db
      POSTGRES_USER: ariq
      POSTGRES_PASSWORD: db_pass123
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - .env


